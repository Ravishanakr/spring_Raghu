<html xmlns:th="https://www.thymeleaf.org/">

<head>

<title>Employee Data</title>



<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" />


</head>


<body>

	<div class="container-fluid mt-5">

		<div class="card">


			<div class="card-header">
				<h3 class="text-center">Welcome Employee Data</h3>
			</div>
			<div class="card-body">


				<table class="table">

					<thead>
						<tr class="bg-info text-white">
							<th>Employee ID</th>
							<th>Employee Name</th>
							<th>Employee Salary</th>
							<th>Employee HRA</th>
							<th>Department</th>
							<th>Address</th>
							<th>Employee DOB</th>
							<th>Gender</th>

							<th>Operations</th>
						</tr>
					</thead>
					<tbody>


						<tr th:each="emp:${EmpList}">

							<td th:text="${emp.empId}"></td>
							<td th:text="${emp.empName}"></td>
							<td th:text="${emp.empSal}"></td>
							<td th:text="${emp.empHra}"></td>
							<td th:text="${emp.empDept}"></td>
							<td th:text="${emp.empAddress}"></td>
							<td th:text="${emp.empDob}"></td>
							<td th:text="${emp.empGender}"></td>


							<td><a class="btn btn-danger"
								th:href="@{/employe/delete(id=${emp.empId})}">DELETE</a> | <a
								class="btn btn-primary"
								th:href="@{/employe/edit(id=${emp.empId})}">EDIT</a></td>
						</tr>
					</tbody>
				</table>

			</div>
			<div th:if="${msg}">
				<h5 class="card-footer bg-primary text-white text-center">
					[[${msg}]]</h5>
			</div>
			

		</div>

	</div>

</body>

</html>
